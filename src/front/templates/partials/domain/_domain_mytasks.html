<div class="content-section">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div class="me-auto">
            <h4 class="mb-1"><i class="bi bi-inbox me-2"></i>My Tasks</h4>
            <p class="text-muted mb-0 small">
                Tasks assigned to you and domain versions waiting on your
                review &mdash; act on them inline.
            </p>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary"
                id="btnRefreshDomainTasks" title="Reload my tasks">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>

    <div id="domainMyTasksContainer">
        <div class="text-center text-muted small py-4">
            <span class="spinner-border spinner-border-sm me-1"></span>
            Loading your tasks...
        </div>
    </div>
</div>
