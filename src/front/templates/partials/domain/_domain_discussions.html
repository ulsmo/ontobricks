<div class="content-section">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div class="me-auto">
            <h4 class="mb-1"><i class="bi bi-chat-left-text me-2"></i>Discussions</h4>
            <p class="text-muted mb-0 small">
                Every discussion across this domain &mdash; ontology,
                mappings and the digital twin &mdash; as one activity timeline.
            </p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="dropdown" id="domainDiscTagFilterWrap" style="display:none;">
                <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                        id="domainDiscTagFilterBtn" data-bs-toggle="dropdown"
                        data-bs-auto-close="outside" aria-expanded="false"
                        title="Filter the timeline by tag">
                    <i class="bi bi-tags me-1"></i>Tags
                    <span class="badge bg-primary ms-1 d-none" id="domainDiscTagCount">0</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end p-2" id="domainDiscTagMenu"
                    style="max-height:320px; overflow-y:auto; min-width:240px;"></ul>
            </div>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="domainDiscShowResolved">
                <label class="form-check-label small text-muted" for="domainDiscShowResolved">
                    Show resolved
                </label>
            </div>
            <button type="button" class="btn btn-sm btn-outline-secondary"
                    id="btnRefreshDomainDiscussions" title="Reload discussions">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <div id="domainDiscussionsContainer">
        <div class="text-center text-muted small py-4">
            <span class="spinner-border spinner-border-sm me-1"></span>
            Loading discussions...
        </div>
    </div>
</div>
