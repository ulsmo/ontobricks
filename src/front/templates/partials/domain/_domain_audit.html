<!-- JS: /static/domain/js/domain-audit.js -->
<!-- Domain Audit Trail Section -->
<div class="content-section">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1"><i class="bi bi-journal-text me-2"></i>Audit trail</h4>
            <p class="text-muted mb-0 small">
                Every status change (with comments) and build run recorded for this domain, newest first.
            </p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <select class="form-select form-select-sm" id="auditVersionFilter"
                    style="width:auto;" title="Filter by version" aria-label="Filter by version">
                <option value="">All versions</option>
            </select>
            <div class="btn-group btn-group-sm" role="group" aria-label="Filter audit trail" id="auditFilter">
                <button type="button" class="btn btn-outline-secondary active" data-audit-filter="all">All</button>
                <button type="button" class="btn btn-outline-secondary" data-audit-filter="review">
                    <i class="bi bi-chat-left-text me-1"></i>Status &amp; comments
                </button>
                <button type="button" class="btn btn-outline-secondary" data-audit-filter="build">
                    <i class="bi bi-hdd-stack me-1"></i>Builds
                </button>
            </div>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="btnReloadAudit"
                    title="Reload audit trail from the registry">
                <i class="bi bi-arrow-counterclockwise me-1"></i> Refresh
            </button>
        </div>
    </div>

    <div id="auditBody">
        <div class="text-center text-muted small py-5">
            <span class="spinner-border spinner-border-sm me-1"></span>
            Loading audit trail&hellip;
        </div>
    </div>
</div>
