<!-- JS: /static/domain/js/domain-owl-content.js -->
<!-- OWL Content Section -->
<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-1"><i class="bi bi-file-earmark-code me-2"></i>OWL Content (Turtle Format)</h4>
        <p class="text-muted mb-0 small">Generated OWL representation of your ontology</p>
    </div>
    <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="copyOwlBtn">
            <i class="bi bi-clipboard me-1"></i> Copy
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="downloadOwlBtn">
            <i class="bi bi-download me-1"></i> Download
        </button>
        <button type="button" class="btn btn-sm btn-outline-primary" id="regenerateOwlBtn" title="Regenerate OWL from current ontology">
            <i class="bi bi-arrow-clockwise me-1"></i> Regenerate
        </button>
    </div>
</div>
<div class="card h-100">
    <div class="card-body d-flex flex-column">
        <div id="owlStatusMessage" class="alert alert-info d-none mb-2">
            <i class="bi bi-info-circle"></i> <span id="owlStatusText"></span>
        </div>
        <textarea class="form-control font-monospace flex-grow-1 ob-code-editor-surface" id="owlPreview" readonly 
                  placeholder="OWL will be generated automatically when you add entities or relationships..."></textarea>
    </div>
</div>
