<!-- GraphQL Playground (embedded GraphiQL) -->

<div class="section-header d-flex justify-content-between align-items-center mb-2">
    <div>
        <h4 class="mb-1"><i class="bi bi-braces-asterisk me-2"></i>GraphQL Playground</h4>
        <p class="text-muted mb-0 small">
            Query the knowledge graph with the auto-generated GraphQL schema<br>
            <i class="bi bi-folder2-open"></i> Domain: <code class="text-primary">{{ domain_name }}</code> <span class="badge bg-secondary bg-opacity-50 ob-badge-version">v{{ current_version }}</span> <span class="js-version-status-badge badge border bg-warning-subtle text-dark border-warning" style="font-size:0.6rem;">Draft</span><br>
            <i class="bi bi-diagram-3"></i> Graph DB: <code id="graphqlGraphDbName" class="text-primary">{{ graph_name or 'Not configured' }}</code>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1 ms-2" onclick="_openGraphSwitcherModal()" title="Switch to another domain graph">
                <i class="bi bi-arrow-left-right me-1"></i>Switch domain
            </button>
        </p>
    </div>
    <div class="d-flex align-items-center gap-2">
        <div class="d-flex align-items-center gap-1" id="graphqlDepthControl" style="display:none" title="Relationship traversal depth">
            <label for="graphqlDepthSelect" class="form-label mb-0 small text-muted">Depth</label>
            <select id="graphqlDepthSelect" class="form-select form-select-sm graphql-depth-select">
            </select>
        </div>
        <button class="btn btn-sm btn-outline-primary" onclick="OntologyViewer.open()" title="View ontology model">
            <i class="bi bi-diagram-3"></i> View Ontology
        </button>
        <button class="btn btn-sm btn-outline-secondary" id="graphqlOpenNewTab" title="Open in new tab" style="display:none">
            <i class="bi bi-box-arrow-up-right me-1"></i>New tab
        </button>
    </div>
</div>

<div id="graphqlLoading" class="text-center py-5" style="display:none">
    <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading GraphiQL…</span>
    </div>
    <div class="text-muted mt-2">Loading GraphQL schema…</div>
</div>

<div id="graphqlError" class="alert alert-danger" style="display:none" role="alert">
    <i class="bi bi-x-circle me-2"></i>
    <span id="graphqlErrorMsg"></span>
</div>

<div id="graphiql-container" style="display:none"></div>
