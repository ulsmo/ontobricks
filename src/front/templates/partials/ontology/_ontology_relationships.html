<!-- Relationships (Properties) Section -->
<!-- JS: /static/ontology/js/ontology-relationships.js -->
<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-1"><i class="bi bi-arrow-left-right me-2"></i>Relationships (Properties)</h4>
        <p class="text-muted mb-0 small">Define how entities relate to each other</p>
    </div>
    <button type="button" class="btn btn-sm btn-outline-primary ontology-edit-btn" onclick="openRelationshipPanel()">
        <i class="bi bi-plus-circle me-1"></i> Add Relationship
    </button>
</div>
<div class="card border-0 shadow-sm ob-ontology-panel-card">
    <div class="card-body p-0 ob-ontology-panel-card-body">
        <div id="ontology-relationships-container" class="ob-ontology-split-scroll-outer">
            <div class="relationships-content ob-ontology-split-scroll-inner">
                <p class="text-muted small mb-3">Define how entities relate to each other. Click on a relationship to edit it.</p>
                <div id="propertiesList" class="relationship-tree">
                    <div class="text-muted small">No relationships defined yet</div>
                </div>
            </div>
        </div>
    </div>
</div>
