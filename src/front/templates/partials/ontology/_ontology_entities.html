<!-- Classes Hierarchy Section -->
<!-- JS: /static/ontology/js/ontology-entities.js -->
<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div class="me-auto">
        <h4 class="mb-1"><i class="bi bi-diagram-3 me-2"></i>Classes (Hierarchy)</h4>
        <p class="text-muted mb-0 small">View the class inheritance hierarchy and manage entities</p>
    </div>
    <div class="d-flex gap-2">
        <div class="btn-group btn-group-sm">
            <button type="button" class="btn btn-outline-secondary" onclick="expandAllClasses()" title="Expand All">
                <i class="bi bi-arrows-expand"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary" onclick="collapseAllClasses()" title="Collapse All">
                <i class="bi bi-arrows-collapse"></i>
            </button>
        </div>
        <button type="button" class="btn btn-sm btn-outline-primary ontology-edit-btn" onclick="openEntityPanel()">
            <i class="bi bi-plus-circle me-1"></i> Add Entity
        </button>
        <button type="button" class="btn btn-sm btn-outline-primary onto-discuss-btn"
                title="Open the ontology discussion" onclick="openOntologyDiscussion()">
            <i class="bi bi-chat-dots"></i>
        </button>
    </div>
</div>
<div class="card border-0 shadow-sm ob-ontology-panel-card">
    <div class="card-body p-0 ob-ontology-panel-card-body">
        <div id="ontology-entities-container" class="ob-ontology-entities-row">
            <div class="entities-content ob-ontology-entities-main">
                <p class="text-muted small mb-3">View the class inheritance hierarchy. Click on an entity to view its details and attributes in the right panel.</p>
                <div id="classHierarchyTree">
                    <div class="text-muted small">No classes defined yet</div>
                </div>
            </div>
            <!-- Detail panel will be injected here by JS -->
        </div>
    </div>
</div>
