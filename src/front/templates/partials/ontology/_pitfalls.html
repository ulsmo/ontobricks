<!-- Ontology Pitfalls Section -->
<!-- JS: /static/ontology/js/ontology-pitfalls.js  CSS: /static/ontology/css/ontology-pitfalls.css -->

<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-1"><i class="bi bi-bug me-2"></i>Pitfalls</h4>
        <p class="text-muted mb-0 small">Detect structural, logical, and semantic issues in your ontology (P1.1–P4.7)</p>
    </div>
    <div class="d-flex align-items-center gap-3">
        <!-- Precision score gauge (hidden until first analysis) -->
        <div id="pitfallsGaugeWrapper" class="d-none text-center" style="min-width:90px" title="Ontology Precision Score">
            <svg id="pitfallsGaugeSvg" width="72" height="72" viewBox="0 0 72 72" aria-label="Precision score gauge">
                <circle cx="36" cy="36" r="28" fill="none" stroke="#e9ecef" stroke-width="8"/>
                <circle id="pitfallsGaugeArc" cx="36" cy="36" r="28" fill="none"
                        stroke="#198754" stroke-width="8" stroke-linecap="round"
                        stroke-dasharray="175.93" stroke-dashoffset="175.93"
                        transform="rotate(-90 36 36)"/>
                <text id="pitfallsGaugeLabel" x="36" y="40" text-anchor="middle"
                      font-size="14" font-weight="700" fill="#212529">—</text>
            </svg>
            <div class="small text-muted" style="font-size:.7rem;margin-top:-2px">Precision</div>
        </div>
        <button class="btn btn-sm btn-primary" id="pitfallsRunBtn">
            <i class="bi bi-play-fill me-1"></i>Run Analysis
        </button>
    </div>
</div>

<div class="card h-100">
    <div class="card-body p-0 d-flex flex-column">

        <!-- Tab strip -->
        <ul class="nav nav-tabs ob-tabs" id="pitfallsTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pitfalls-patterns-tab"
                        data-bs-toggle="tab" data-bs-target="#pitfalls-patterns-pane"
                        type="button" role="tab">
                    <i class="bi bi-sliders me-1"></i>Patterns
                    <span class="badge bg-secondary ms-1" id="pitfallsSelectedCount">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pitfalls-results-tab"
                        data-bs-toggle="tab" data-bs-target="#pitfalls-results-pane"
                        type="button" role="tab">
                    <i class="bi bi-list-check me-1"></i>Results
                    <span class="badge bg-secondary ms-1 d-none" id="pitfallsResultsBadge">0</span>
                </button>
            </li>
        </ul>

        <!-- Progress area (visible across all tabs while running) -->
        <div id="pitfallsProgress" class="flex-shrink-0 d-none px-3 py-3 border-bottom">
            <div class="text-center mb-2">
                <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                <strong id="pitfallsProgressMsg" class="text-muted">Starting analysis…</strong>
            </div>
            <div class="progress pf-progress-md">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     id="pitfallsProgressBar" role="progressbar" style="width: 0%">0%</div>
            </div>
            <small id="pitfallsProgressDetail" class="text-muted mt-1 d-block text-center"></small>
        </div>

        <!-- Tab panes -->
        <div class="tab-content p-3" id="pitfallsTabContent">

            <!-- ── Patterns pane ──────────────────────────────────────── -->
            <div class="tab-pane fade show active" id="pitfalls-patterns-pane" role="tabpanel">

                <!-- Toolbar -->
                <div class="d-flex gap-2 align-items-center mb-3">
                    <button class="btn btn-sm btn-outline-secondary" id="pitfallsSelectAllBtn"
                            title="Select all patterns">
                        <i class="bi bi-check2-all me-1"></i>All
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" id="pitfallsFastBtn"
                            title="Fast only (no ML)">
                        <i class="bi bi-lightning me-1"></i>Fast only
                    </button>
                </div>

                <!-- Pattern checkboxes (rendered synchronously from static taxonomy) -->
                <div id="pitfallsPatternBody"></div>
            </div>

            <!-- ── Results pane ───────────────────────────────────────── -->
            <div class="tab-pane fade" id="pitfalls-results-pane" role="tabpanel">

                <!-- Empty state -->
                <div id="pitfallsEmpty" class="text-center py-5 text-muted">
                    <i class="bi bi-bug display-6 mb-3 d-block opacity-50"></i>
                    <p class="mb-1 fw-semibold">No analysis run yet</p>
                    <p class="small">Go to the <strong>Patterns</strong> tab and click <strong>Run Analysis</strong>.</p>
                </div>

                <!-- Results -->
                <div id="pitfallsResults" class="d-none">
                    <div class="alert d-flex align-items-center gap-3 mb-3" id="pitfallsSummaryBanner">
                        <i class="bi fs-4" id="pitfallsSummaryIcon"></i>
                        <div class="flex-grow-1">
                            <div class="fw-semibold" id="pitfallsSummaryTitle"></div>
                            <div class="small text-muted" id="pitfallsSummaryDetail"></div>
                        </div>
                        <!-- Inline precision score badge in result banner -->
                        <div id="pitfallsScoreBadge" class="text-center" style="min-width:64px">
                            <div id="pitfallsScoreValue" class="fw-bold fs-4"></div>
                            <div class="small text-muted" style="font-size:.7rem">/ 100</div>
                            <div class="small text-muted" style="font-size:.65rem">Precision</div>
                        </div>
                    </div>
                    <div class="accordion" id="pitfallsAccordion"></div>
                </div>

            </div>
        </div><!-- /tab-content -->

    </div><!-- /card-body -->
</div><!-- /card -->

<p class="text-muted mt-2 mb-0" style="font-size: 0.72rem;">
    <i class="bi bi-heart-fill text-danger me-1" style="font-size:0.65rem;"></i>Powered by
    <a href="https://github.com/D2KLab/Ontology-Pitfalls-Detector" target="_blank" rel="noopener"
       class="text-muted text-decoration-none">D2KLab Ontology-Pitfalls-Detector</a>
    (Apache 2.0)
</p>
