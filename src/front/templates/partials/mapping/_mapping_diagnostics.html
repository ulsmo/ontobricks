<!-- Mapping Diagnostics Section -->
<!-- JS: /static/mapping/js/mapping-diagnostics.js -->
<!-- CSS: /static/mapping/css/mapping-diagnostics.css -->

<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-1"><i class="bi bi-shield-check me-2"></i>Mapping Diagnostics</h4>
        <p class="text-muted mb-0 small">Validate entity and relationship mappings before building the Digital Twin</p>
    </div>
    <button type="button" class="btn btn-sm btn-primary" id="runDiagnosticsBtn">
        <i class="bi bi-play-circle me-1"></i> Run Diagnostics
    </button>
</div>

<!-- KPI Tiles -->
<div id="diagKpiTiles" class="row g-3 mb-4 d-none">
    <div class="col">
        <div class="ob-kpi-tile">
            <div class="ob-kpi-tile-icon"><i class="bi bi-list-check"></i></div>
            <div class="ob-kpi-tile-value" id="diagTotalCount">0</div>
            <div class="ob-kpi-tile-label">Total Checks</div>
        </div>
    </div>
    <div class="col">
        <div class="ob-kpi-tile tile-accent-success">
            <div class="ob-kpi-tile-icon text-success"><i class="bi bi-check-circle-fill"></i></div>
            <div class="ob-kpi-tile-value text-success" id="diagOkCount">0</div>
            <div class="ob-kpi-tile-label">Passed</div>
        </div>
    </div>
    <div class="col">
        <div class="ob-kpi-tile tile-accent-warning">
            <div class="ob-kpi-tile-icon text-warning"><i class="bi bi-exclamation-triangle-fill"></i></div>
            <div class="ob-kpi-tile-value text-warning" id="diagWarningCount">0</div>
            <div class="ob-kpi-tile-label">Warnings</div>
        </div>
    </div>
    <div class="col">
        <div class="ob-kpi-tile tile-accent-danger">
            <div class="ob-kpi-tile-icon text-danger"><i class="bi bi-x-circle-fill"></i></div>
            <div class="ob-kpi-tile-value text-danger" id="diagErrorCount">0</div>
            <div class="ob-kpi-tile-label">Errors</div>
        </div>
    </div>
</div>

<!-- Loading spinner -->
<div id="diagLoading" class="text-center py-5 d-none">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Running diagnostics...</span>
    </div>
    <p class="text-muted mt-2">Running diagnostics...</p>
</div>

<!-- Empty state -->
<div id="diagEmptyState" class="text-center py-5">
    <i class="bi bi-shield-check display-4 text-muted"></i>
    <p class="text-muted mt-3">Click <strong>Run Diagnostics</strong> to validate all entity and relationship mappings.</p>
</div>

<!-- Results -->
<div id="diagResults" class="d-none">
    <div class="accordion" id="diagAccordion">
        <!-- Entities -->
        <div class="accordion-item diag-accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button diag-accordion-btn" type="button"
                        data-bs-toggle="collapse" data-bs-target="#diagEntitiesCollapse"
                        aria-expanded="true" aria-controls="diagEntitiesCollapse">
                    <i class="bi bi-box me-2"></i>Entities
                    <span class="badge bg-secondary ms-2" id="diagEntityBadge">0</span>
                </button>
            </h2>
            <div id="diagEntitiesCollapse" class="accordion-collapse collapse show"
                 data-bs-parent="#diagAccordion">
                <div class="accordion-body p-0" id="diagEntitiesBody"></div>
            </div>
        </div>

        <!-- Relationships -->
        <div class="accordion-item diag-accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed diag-accordion-btn" type="button"
                        data-bs-toggle="collapse" data-bs-target="#diagRelCollapse"
                        aria-expanded="false" aria-controls="diagRelCollapse">
                    <i class="bi bi-arrow-left-right me-2"></i>Relationships
                    <span class="badge bg-secondary ms-2" id="diagRelBadge">0</span>
                </button>
            </h2>
            <div id="diagRelCollapse" class="accordion-collapse collapse"
                 data-bs-parent="#diagAccordion">
                <div class="accordion-body p-0" id="diagRelationshipsBody"></div>
            </div>
        </div>

        <!-- Source table permissions -->
        <div class="accordion-item diag-accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed diag-accordion-btn" type="button"
                        data-bs-toggle="collapse" data-bs-target="#diagPermissionsCollapse"
                        aria-expanded="false" aria-controls="diagPermissionsCollapse">
                    <i class="bi bi-shield-lock me-2"></i>Source table permissions
                    <span class="badge bg-secondary ms-2" id="diagPermBadge">0</span>
                </button>
            </h2>
            <div id="diagPermissionsCollapse" class="accordion-collapse collapse"
                 data-bs-parent="#diagAccordion">
                <div class="accordion-body p-0" id="diagPermissionsBody"></div>
            </div>
        </div>
    </div>
</div>
