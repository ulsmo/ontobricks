<!-- JS: /static/mapping/js/mapping-r2rml.js -->
<!-- R2RML Content Section -->

<!-- Loading overlay (shown until data loads) -->
<div id="r2rmlLoadingOverlay" class="mapping-loading-overlay">
    <div class="ob-loading-spinner">
        <svg class="ob-spinner-svg" viewBox="0 0 80 80" fill="none">
            <g class="ob-ring">
                <g stroke="#CBD5E1" stroke-width="1.2" opacity="0.5">
                    <line x1="40" y1="10" x2="61" y2="19"/><line x1="61" y1="19" x2="70" y2="40"/>
                    <line x1="70" y1="40" x2="61" y2="61"/><line x1="61" y1="61" x2="40" y2="70"/>
                    <line x1="40" y1="70" x2="19" y2="61"/><line x1="19" y1="61" x2="10" y2="40"/>
                    <line x1="10" y1="40" x2="19" y2="19"/><line x1="19" y1="19" x2="40" y2="10"/>
                </g>
                <circle cx="40" cy="10" r="5" fill="#FF3621"/><circle cx="61" cy="19" r="5" fill="#6366F1"/>
                <circle cx="70" cy="40" r="5" fill="#4ECDC4"/><circle cx="61" cy="61" r="5" fill="#F59E0B"/>
                <circle cx="40" cy="70" r="5" fill="#FF3621"/><circle cx="19" cy="61" r="5" fill="#6366F1"/>
                <circle cx="10" cy="40" r="5" fill="#4ECDC4"/><circle cx="19" cy="19" r="5" fill="#F59E0B"/>
            </g>
            <g transform="translate(40,40)">
                <g class="ob-center">
                    <path d="M0-12 L10-6 L0 0 L-10-6Z" fill="#FF3621"/>
                    <path d="M0-5 L10 1 L0 7 L-10 1Z" fill="#FF3621" opacity="0.85"/>
                    <path d="M0 2 L10 8 L0 14 L-10 8Z" fill="#FF3621" opacity="0.7"/>
                </g>
            </g>
        </svg>
        <span class="ob-spinner-label">Loading R2RML content...</span>
    </div>
</div>

<div class="section-header d-flex justify-content-between align-items-center mb-4">
    <div class="me-auto">
        <h4 class="mb-1"><i class="bi bi-link-45deg me-2"></i>R2RML Content (Turtle Format)</h4>
        <p class="text-muted mb-0 small">Generated R2RML mapping from current mappings</p>
    </div>
    <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="copyR2RMLBtn">
            <i class="bi bi-clipboard me-1"></i> Copy
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="downloadR2RMLBtn">
            <i class="bi bi-download me-1"></i> Download
        </button>
        <button type="button" class="btn btn-sm btn-outline-primary" id="regenerateR2RMLBtn" title="Regenerate R2RML from current mappings">
            <i class="bi bi-arrow-clockwise me-1"></i> Regenerate
        </button>
        <button type="button" class="btn btn-sm btn-outline-primary onto-discuss-btn"
                title="Open the mappings discussion" onclick="openMappingDiscussion()">
            <i class="bi bi-chat-dots"></i>
        </button>
    </div>
</div>
<div class="card h-100">
    <div class="card-body d-flex flex-column">
        <div id="r2rmlStatusMessage" class="alert alert-info d-none mb-2">
            <i class="bi bi-info-circle"></i> <span id="r2rmlStatusText"></span>
        </div>
        <textarea class="form-control font-monospace flex-grow-1 ob-code-editor-surface" id="r2rmlPreview" readonly 
                  placeholder="R2RML will be generated when you create entity and relationship mappings..."></textarea>
    </div>
</div>
