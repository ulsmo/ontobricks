<div class="content-section">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1"><i class="bi bi-inbox me-2"></i>My Tasks</h4>
            <p class="text-muted mb-0 small">
                Domains and versions waiting on you &mdash; submit for
                review, sign off as a reviewer, or publish once approved.
            </p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button type="button"
                    class="btn btn-sm btn-outline-secondary"
                    id="btnRefreshMyTasks"
                    title="Reload my tasks">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <div id="myTasksContainer">
        <div class="text-center text-muted small py-4">
            <span class="spinner-border spinner-border-sm me-1"></span>
            Loading your tasks...
        </div>
    </div>
</div>
